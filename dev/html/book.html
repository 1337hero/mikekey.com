<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="robots" content="noindex, nofollow">
        <meta content="text/html; charset=utf-8" http-equiv="content-type">
        <meta charset="utf-8">

        <title>{{ siteTitle }}</title>
    
        <meta content="width=device-width, initial-scale=1" name="viewport">

        <link href="./img/avatar.webp" rel="icon" type="image/webp">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;800&display=swap" rel="stylesheet">


        <link href="./css/styles.css" rel="stylesheet" type="text/css">
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js"></script>

    </head>
    <body>
        <main class="container">
            <!-- Intro --->
            <header aria-label="quick summary">
                <img class="avatar" src="/img/Mike-Key-Profile-Pic-Master-Banner_07-11-2023_001.webp" alt="Mike's Handsome Face" >
                <h1>{{ pageTitle }}</h1>
                <h2>Let's connect and discuss real estate.</h2>
            </header>
            <!-- Social Media Links --->
            <article class="socials" aria-label="social media links">

                    <!-- Calendly inline widget begin -->
                    <div id="calendly-widget" class="calendly" style="min-width:320px;height:630px;"></div>
                    <!-- Calendly inline widget end -->
 
            </article>


        </main>

        <script type="text/javascript">
            Calendly.initInlineWidget({
             url: 'https://calendly.com/justmikekey/connect-with-mike?hide_event_type_details=1&hide_gdpr_banner=1',
             parentElement: document.getElementById('calendly-widget'),
             prefill: {},
             utm: {}
            });
        </script>

    </body>
</html>
